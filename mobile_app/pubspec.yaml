name: campus_hazard_app
description: Campus Hazard Detection - real-time YOLO ensemble + meta-classifier + LLM.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0        # live camera frames / capture
  http: ^1.2.0           # call the backend /infer and /recommend
  path_provider: ^2.1.0  # evidence storage location
  intl: ^0.19.0          # timestamps for evidence records

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
