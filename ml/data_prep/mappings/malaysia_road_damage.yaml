# Malaysia Road Damage Detector (Roboflow: fyp-o8veb/malaysia-road-damage-detector)
# -> pothole, cracked_pavement, (uncovered_manhole if present)
#
# Malaysian-domain road imagery -> much closer to our bus-stop kerb/road context
# than generic highway sets. PREFER this for member1's pothole/crack data.
#   python prepare_dataset.py --source <dir> --member member1 --mapping mappings/malaysia_road_damage.yaml
#   python prepare_dataset.py --source <dir> --member member2 --mapping mappings/malaysia_road_damage.yaml   # pothole overlap
#
# ⚠️ Malaysia road-damage sets often use Japan/India road-damage CODES. Run --list
# first and confirm. Typical RDD codes:
#   D00 longitudinal crack, D10 transverse crack, D20 alligator crack,
#   D40 pothole, D43/D44 markings, etc.
map:
  pothole: pothole
  Pothole: pothole
  D40: pothole
  crack: cracked_pavement
  cracks: cracked_pavement
  D00: cracked_pavement
  D10: cracked_pavement
  D20: cracked_pavement
  longitudinal_crack: cracked_pavement
  transverse_crack: cracked_pavement
  alligator_crack: cracked_pavement
  manhole: uncovered_manhole
  uncovered_manhole: uncovered_manhole
  # DROP road markings / non-hazards:
  D43: null
  D44: null
  white_line: null
